<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pilih Level - NET-LEARN</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');

        body {
            margin: 0;
            background-color: #e0f2fe; /* Biru sangat muda */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Poppins', sans-serif;
        }

        .phone-screen {
        width: 100%;
        max-width: 412px;   /* Menjaga tampilan tetap rapi di laptop/PC */
        min-height: 100vh;  /* Membuat tinggi halaman otomatis pas & penuh di HP beneran */
        display: flex;
        flex-direction: column;
        position: relative;
        box-sizing: border-box;
        background-color: #ffffff; /* Sesuai warna latar belakang halaman video kamu */
        
        /* INI KUNCI UTAMANYA UNTUK MENGHILANGKAN CASING HP */
        border: none;        /* Menghapus garis hitam tebal bingkai HP */
        border-radius: 0;   /* Menghapus lengkungan sudut HP */
        box-shadow: none;   /* Menghapus bayangan bingkai */
    }

        .header {
            background-color: #0077b6;
            padding: 40px 20px 20px;
            text-align: center;
            color: white;
            position: relative;
        }
        .header a { color: white; position: absolute; left: 20px; top: 43px; font-size: 1.2rem; }
        .header h3 { margin: 0; font-size: 1.1rem; letter-spacing: 1px; }

        .content { padding: 30px 20px; flex-grow: 1; }

        .instruction {
            color: #64748b;
            text-align: center;
            font-size: 0.8rem;
            margin-bottom: 25px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .level-card {
            background: white;
            border: 2px solid #e2e8f0;
            border-radius: 20px;
            padding: 18px;
            display: flex;
            align-items: center;
            text-decoration: none;
            margin-bottom: 15px;
            transition: all 0.2s ease;
        }
        .level-card:hover {
            border-color: #00b4d8;
            background-color: #f0f9ff;
            transform: scale(1.02);
        }

        .icon-box {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            margin-right: 15px;
        }

        /* Warna Ikon per Level */
        .lvl-1 .icon-box { background: #e0f2fe; color: #0077b6; }
        .lvl-2 .icon-box { background: #f3e8ff; color: #7e22ce; }
        .lvl-3 .icon-box { background: #fef3c7; color: #d97706; }

        .info-text h4 { margin: 0; color: #1e293b; font-size: 1rem; }
        .info-text p { margin: 2px 0 0; color: #64748b; font-size: 0.75rem; }
    </style>
</head>
<body>
    <div class="phone-screen">
        <div class="header">
            <a href="index.html"><i class="fas fa-arrow-left"></i></a>
            <h3>PILIH TINGKAT KESULITAN</h3>
        </div>
        <div class="content">
            <p class="instruction">Daftar Misi</p>
            <a href="kuis.html?level=1" class="level-card lvl-1">
                <div class="icon-box"><i class="fas fa-laptop"></i></div>
                <div class="info-text"><h4>LEVEL 01</h4><p>Dasar Komputer & Hardware</p></div>
            </a>
            <a href="kuis.html?level=2" class="level-card lvl-2">
                <div class="icon-box"><i class="fas fa-network-wired"></i></div>
                <div class="info-text"><h4>LEVEL 02</h4><p>Jaringan LAN & Kabel</p></div>
            </a>
            <a href="kuis.html?level=3" class="level-card lvl-3">
                <div class="icon-box"><i class="fas fa-server"></i></div>
                <div class="info-text"><h4>LEVEL 03</h4><p>Server & Administrasi Jaringan</p></div>
            </a>
        </div>
    </div>
</body>
</html>
