<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Pembelajaran - TKJ</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* CSS FRAME HP - KONSISTEN 740px */
        .phone-screen {
            width: 360px;
            height: 740px;
            border: 12px solid #000;
            border-radius: 45px;
            margin: 20px auto;
            background-color: #e0f2fe;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            box-sizing: border-box;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            font-family: 'Poppins', sans-serif, Arial;
        }

        /* HEADER */
        .header {
            background-color: #38b6ff;
            padding: 20px;
            display: flex;
            align-items: center;
            color: white;
            position: relative;
        }
        .header a { color: white; text-decoration: none; position: absolute; left: 20px; }
        .header h3 { margin: 0; width: 100%; text-align: center; font-size: 1.2rem; font-weight: 700; }

        /* PEMUTAR VIDEO */
        .video-player-container {
            padding: 20px;
        }
        .main-video-frame {
            width: 100%;
            height: 190px;
            background-color: #000;
            border-radius: 20px;
            border: 3px solid #9333ea;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        iframe { width: 100%; height: 100%; border: none; }

        /* DAFTAR VIDEO */
        .video-list-section {
            padding: 0 20px;
            flex-grow: 1;
            overflow-y: auto;
        }
        .video-list-section h4 { margin-bottom: 15px; color: #1e293b; font-weight: 800; }

        .video-item {
            background: white;
            border: 2px solid #38b6ff;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .video-item:hover { transform: translateY(-2px); background: #f0f9ff; }
        .video-item.active { background: #38b6ff; border-color: #0077b6; }
        .video-item.active .video-title, .video-item.active .video-duration { color: white; }

        .video-title { font-weight: bold; color: #1e293b; font-size: 0.9rem; }
        .video-duration { font-weight: bold; color: #64748b; font-size: 0.8rem; }

        /* FOOTER */
        .footer {
            padding: 20px;
            background-color: #e0f2fe;
            border-top: 1px solid rgba(0,0,0,0.05);
        }
        .btn-main-menu {
            background-color: #38b6ff;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 20px;
            width: 100%;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            text-decoration: none;
            display: block;
            text-align: center;
            box-sizing: border-box;
            box-shadow: 0 4px 10px rgba(56, 182, 255, 0.3);
        }
    </style>
</head>
<body>

<div class="phone-screen">
    <!-- Header -->
    <div class="header">
        <a href="index.html"><i class="fas fa-chevron-left"></i></a>
        <h3>Video Pembelajaran</h3>
    </div>

    <!-- Layar Pemutar -->
    <div class="video-player-container">
        <div class="main-video-frame" id="player-box">
            <!-- Video default yang muncul saat pertama kali buka -->
            <iframe src="https://www.youtube.com/embed/I3NZInG44KQ" allowfullscreen></iframe>
        </div>
    </div>

    <!-- List Video -->
    <div class="video-list-section">
        <h4>Daftar Video</h4>
        
        <div class="video-item active" onclick="playVideo('https://www.youtube.com/embed/I3NZInG44KQ', this)">
            <span class="video-title">1. Dasar Jaringan Komputer</span>
        </div>

        <div class="video-item" onclick="playVideo('https://www.youtube.com/embed/IhAmT_a73BY', this)">
            <span class="video-title">2. Perangkat Keras Jaringan</span>
        </div>

        <!-- Update Link IP Address & Subneting di sini -->
        <div class="video-item" onclick="playVideo('https://www.youtube.com/embed/Xbsi8nbEyZA', this)">
            <span class="video-title">3. IP Address dan Subneting</span>
        </div>
    </div>

    <!-- Tombol Kembali -->
    <div class="footer">
        <a href="index.html" class="btn-main-menu">Kembali ke Menu Utama</a>
    </div>
</div>

<script>
    function playVideo(url, element) {
        const playerBox = document.getElementById('player-box');
        // autoplay=1 supaya video langsung jalan begitu list diklik
        playerBox.innerHTML = `<iframe src="${url}?autoplay=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;

        // Atur status warna tombol (active)
        const items = document.querySelectorAll('.video-item');
        items.forEach(item => item.classList.remove('active'));
        element.classList.add('active');
    }
</script>

</body>
</html>
